<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Senator Black Collections</title>

  <!-- BOOTSTRAP CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- BOOTSTRAP ICONS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <!-- CUSTOM CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body class="bg-black">
  <section class="py-5 mt-md-5">
    <div class="container-fluid p-0">
      <div class="row g-0">

        <a href="index.html" class="text-white text-decoration-none d-inline-flex align-items-center opacity-75 hover-opacity-100">
      <i class="bi bi-arrow-left me-2"></i> 
      <span class="text-uppercase small fw-bold" style="letter-spacing: 1px;">Back to Collection</span>
    </a>
  
        
        <!-- LEFT SIDE: IMAGE (Responsive) -->
        <div class="col-12 col-md-7">
          <div class="product-image-frame bg-dark">
            <img id="mainProductImg" src="" class="img-fluid w-100" alt="SBC Product">
          </div>
        </div>

        <!-- RIGHT SIDE: PRODUCT INFO -->
        <div class="col-12 col-md-5">
          <div class="p-4 p-md-5 border-start border-light h-100 d-flex flex-column justify-content-center bg-black text-white">
            <p class="text-uppercase opacity-50 small mb-2" id="productCategory">Category</p>
            <h1 class="display-6 display-md-5 fw-bold mb-3" id="productName">Product Name</h1>
            <p class="fs-3 mb-4 fw-light" id="productPrice">₦0.00</p>
            
            <hr class="border-light opacity-25 mb-4">

            <div class="mb-4">
              <label class="small fw-bold mb-2 d-block">SELECT SIZE</label>
              <div class="d-flex gap-2">
                <button class="btn btn-outline-light rounded-0 px-3 size-btn">S</button>
                <button class="btn btn-outline-light rounded-0 px-3 size-btn">M</button>
                <button class="btn btn-outline-light rounded-0 px-3 size-btn">L</button>
                <button class="btn btn-outline-light rounded-0 px-3 size-btn">XL</button>
              </div>
            </div>

            <div class="d-grid mt-auto">
              <button id="addToCartBtn" class="btn btn-light py-3 fw-bold rounded-0">ADD TO CART</button>
            </div>
          </div>
        </div>
        

      </div>
    </div>
  </section>

  <!-- BOOTSTRAP JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- YOUR SCRIPTS (In the correct order) -->
<script src="product-data.js"></script>
<script src="product-detail.js"></script>
</body>
</html>
