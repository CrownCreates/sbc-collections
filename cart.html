<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart - SBC</title>

  <!-- BOOTSTRAP -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- YOUR CSS -->
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/x-icon" href="images/logo/sbc-logo.jpeg">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body style="background:black; color:white; font-family: sans-serif;">

  <!-- NAVBAR -->
  <nav class="navbar navbar-dark bg-black py-4">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">
        <i class="bi bi-arrow-left"></i>  BACK TO SHOP
      </a>
    </div>
  </nav>

  <div class="container my-5">
    <h1 class="fw-black mb-5 text-uppercase" style="letter-spacing: -2px; font-size: 3rem;">Your Bag</h1>

    <div class="row g-5">
      <!-- LEFT: CART ITEMS -->
      <div class="col-lg-8">
        <div id="cart-container" class="d-flex flex-column gap-4">
          <!-- Your JS will inject items here. 
               Make sure your JS only targets ONE ID. -->
        </div>
      </div>

      <!-- RIGHT: SUMMARY BOX -->
      <div class="col-lg-4">
        <div class="p-4 rounded-5 shadow-lg" style="background: #111; border: 1px solid #222; position: sticky; top: 20px;">
          <h3 class="fw-bold mb-4">ORDER SUMMARY</h3>
          
          <div class="d-flex justify-content-between mb-3 text-secondary">
            <span>Subtotal</span>
            <span id="subtotal-display">₦0</span>
          </div>
          
          <div class="d-flex justify-content-between mb-3 text-secondary">
            <span>Shipping</span>
            <span class="text-success">FREE</span>
          </div>

          <hr class="border-secondary my-4">

          <div class="d-flex justify-content-between align-items-center mb-4">
            <span class="fs-5">TOTAL</span>
            <span id="total" class="fs-2 fw-bold text-white">₦0</span>
          </div>

          <button id="checkout-btn" class="btn btn-light w-100 py-3 rounded-pill fw-bold text-uppercase mb-3">
            Proceed to Checkout
          </button>
          
          <a href="index.html" class="btn btn-outline-secondary w-100 py-2 rounded-pill btn-sm">
            Continue Shopping
          </a>
        </div>
      </div>
    </div>
  </div>

  <!-- JS -->
  <script src="cart.js"></script>
</body>
</html>
